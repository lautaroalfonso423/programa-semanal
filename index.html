<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerario</title>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

    <div class="login" id="login">
        <h2>Ingresar código</h2>
        <input id="code" placeholder="ELJY-XXXX-XXXX">
        <button onclick="login()">Ingresar</button>
        <p id="error" style="color:red;"></p>
    </div>

    <div class="app" id="app">
        <div class="app-image-container">
            <img src="./public/WhatsApp Image 2026-06-20 at 11.54.25.jpeg" alt="Banner Itinerario">
        </div>
        <div class="header">
            <h1>Itinerario</h1>
            <p id="title"></p>
        </div>

        <div id="days"></div>

        <div class="contact">
            <h3>Contactos de Emergencia</h3>
            <div id="contactos"></div>
        </div>
    </div>

    <script src="./scripts/data.js"></script>
   <script>
    function login(){
        const code = document.getElementById("code").value;

        if(itinerarios[code]){
            document.getElementById("login").style.display = "none";
            document.getElementById("app").style.display = "block";
            loadData(itinerarios[code][0]);
        } else {
            document.getElementById("error").innerText = "Código incorrecto";
        }
    }

    function loadData(itineario){
        const container = document.getElementById("days");
        container.innerHTML = "";
        
        const headerTitle = document.getElementById("title");
        headerTitle.innerHTML = itineario.title;

        // 1. RENDERIZADO DE DÍAS Y ACTIVIDADES
        itineario.data.forEach(d => {
            const div = document.createElement("div");
            div.className = "day"; 
            div.innerHTML = `<h2>${d.dia}</h2>`;
            
            d.actividades.forEach(a => {
                // Buscador automático en Google Maps basado en el nombre del lugar (Corregido)
                const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.lugar)}`;

                div.innerHTML += `
                    <div class="activity">
                        <div class="activity-time">${a.hora}</div>
                        <div class="activity-details">
                            <strong>${a.nombre}</strong>
                            <span>📍 ${a.lugar}</span>
                            <a href="${googleMapsUrl}" target="_blank" rel="noopener noreferrer" class="maps-link">
                                <i class="fa-solid fa-map-location-dot"></i> Ver ubicación
                            </a>
                        </div>
                    </div>
                `;
            });

            container.appendChild(div);
        });

        const contactosContainer = document.getElementById("contactos");
        contactosContainer.innerHTML = ""; 

        if (itineario.contactos && itineario.contactos.length > 0) {
            itineario.contactos.forEach(contac => {
                const cleanPhone = contac.numero.replace(/[^0-9]/g, "");
                
                contactosContainer.innerHTML += `
                    <div class="data_contact">
                        <div class="contact-info-block">
                            <strong>${contac.encargado}</strong>
                            <span class="phone-number">📞 ${contac.numero}</span>
                        </div>
                        <a href="https://wa.me/${cleanPhone}" target="_blank" rel="noopener noreferrer" class="whatsapp-btn-small">
                            <i class="fab fa-whatsapp"></i> Chat
                        </a>
                    </div>
                `;
            });
        }
    }
</script>

</body>
</html>
